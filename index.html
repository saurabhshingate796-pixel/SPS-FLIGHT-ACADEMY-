<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SPS Flight Academy</title><style>body{background:#0a0e1a;color:#00f7ff;font-family:Arial;text-align:center;padding:50px 20px}.box{background:rgba(10,20,40,.9);border:2px solid #00f7ff;border-radius:15px;padding:30px;max-width:400px;margin:0 auto}h1{text-shadow:0 0 10px #00f7ff}input{width:90%;padding:12px;margin:10px 0;background:#000;border:1px solid #00f7ff;color:#00f7ff;border-radius:8px}button{width:95%;padding:12px;background:#00f7ff;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:10px}#error{color:#ff4757;display:none;margin-top:10px}#game{display:none}</style></head><body><div class="box" id="login"><h1>SPS FLIGHT ACADEMY</h1><p>Professional Drone Pilot Training</p><input id="u" placeholder="Pilot ID"><input type="password" id="p" placeholder="Password"><button onclick="login()">ENTER SIMULATOR</button><p id="error">Invalid Pilot ID or Password</p></div><div class="box" id="game"><h1>Welcome, Datta! 🚁</h1><p>Simulator Activated | Battery: 100%</p><button onclick="alert('Drone Takeoff!')">START FLIGHT</button></div><script>function login(){let u=document.getElementById('u').value.trim();let p=document.getElementById('p').value.trim();if(u==='Datta'&&p==='1234'){document.getElementById('login').style.display='none';document.getElementById('game').style.display='block';}else{document.getElementById('error').style.display='block';}}</script></body></html>
